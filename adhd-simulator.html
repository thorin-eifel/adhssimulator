// ── PAUSE STATE ───────────────────────────────────────
let isPaused = false;
let _pauseSavedSecs = 0;
let _pauseSavedOnEnd = null;
const PAUSE_FOCUS_COST = 8;

function togglePause() {
  if(phase==='debrief'||phase==='calibration'||phase==='welcome') return;
  isPaused ? resumeSim() : pauseSim();
}

function pauseSim() {
  isPaused = true;
  clearInterval(simTimer);
  // Freeze task countdown
  if(TM.cdTimer) {
    _pauseSavedSecs  = TM.cdSecs;
    _pauseSavedOnEnd = TM._onEnd;
    clearInterval(TM.cdTimer);
    TM.cdTimer = null;
  }
  // Focus cost
  dropFocus(PAUSE_FOCUS_COST);
  haptic([200, 80, 200]);
  // Quiet audio
  if(SFX.audio) SFX._fadeTo(0.12, 400);
  // Update UI
  const btn = document.getElementById('pause-btn');
  if(btn){ btn.textContent='▶'; btn.classList.add('paused'); }
  const S = T[lang];
  const costEl = document.getElementById('ui-pause-cost');
  if(costEl) costEl.textContent = (S.pauseCost || `\u2212${PAUSE_FOCUS_COST} Fokus`);
  const resumeEl = document.getElementById('ui-pause-resume');
  if(resumeEl) resumeEl.textContent = S.pauseResume || 'Weiter';
  document.getElementById('pause-overlay').classList.add('show');
}

function resumeSim() {
  isPaused = false;
  document.getElementById('pause-overlay').classList.remove('show');
  const btn = document.getElementById('pause-btn');
  if(btn){ btn.textContent='⏸'; btn.classList.remove('paused'); }
  // Restore task countdown
  if(_pauseSavedSecs > 0 && _pauseSavedOnEnd) {
    TM.startCd(_pauseSavedSecs, _pauseSavedOnEnd);
    _pauseSavedSecs = 0; _pauseSavedOnEnd = null;
  }
  // Restart sim timer
  simTimer = setInterval(tick, 1000);
  // Restore audio volume
  const vol = {calm:.50,mild:.62,moderate:.78,intense:.98}[phase]||.50;
  if(SFX.audio) SFX._fadeTo(vol, 600);
  haptic([80]);
}

function calcTax() {
  const secs = simStats.thoughtsSpawned*28 + simStats.notifsSpawned*32 +
               simStats.coworkerHits*42 + simStats.hyperFocusSecs;
  const mins = Math.max(0, Math.round(secs/60));
  const pct  = Math.min(100, Math.round(mins/20*100));
  return {secs, mins, pct};
}

    simStats.notifsSpawned   > 0 && {icon:'🔔', lbl:`${simStats.notifsSpawned} ${S.taxNtL||'Benachrichtigungen'} × ~32s`, val:`~${Math.round(simStats.notifsSpawned*32/60)||'<1'} Min.`},
    simStats.coworkerHits    > 0 && {icon:'💬', lbl:`${simStats.coworkerHits} ${S.taxCwL||'Kollegen-Interrupts'} × ~42s`, val:`~${Math.round(simStats.coworkerHits*42/60)||'<1'} Min.`},
    simStats.hyperFocusSecs  > 15 && {icon:'⚡', lbl:S.taxHyL||'Hyperfokus-Falle', val:`~${Math.round(simStats.hyperFocusSecs/60)||'<1'} Min.`},
  ].filter(Boolean);
  const rows = rowData.map(r=>`<div class="tax-row"><span class="tax-row-icon">${r.icon}</span><span class="tax-row-lbl">${r.lbl}</span><span class="tax-row-val">${r.val}</span></div>`).join('');

        <div class="tax-sub">${S.taxSub||'Wo die Zeit wirklich geblieben ist'}</div>
      </div>

        <div class="tax-total-num">~${mins}</div>

      </div>
    </div>

    <div class="tax-bar-row">

      <div class="tax-bar-pct">${pct}%</div>

  // Animate bar
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const el=document.getElementById('tax-fill');

  }));
}

function drawSparkline(canvasId, samples, w, h, opts) {
  const canvas = document.getElementById(canvasId);
  if(!canvas||!samples.length) return;
  const dpr = Math.min(window.devicePixelRatio||1,2);
  canvas.width  = (w||canvas.offsetWidth||400) * dpr;
  canvas.height = (h||60) * dpr;
  canvas.style.height = (h||60)+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const cw = canvas.width/dpr, ch = canvas.height/dpr;
  const pad = opts&&opts.pad||4;
  const pts = samples.map((v,i)=>({
    x: pad + i/(samples.length-1)*(cw-pad*2),
    y: ch - pad - (v/100)*(ch-pad*2)
  }));
  // fill
  ctx.beginPath();
  pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x, ch);
  ctx.lineTo(pts[0].x, ch);
  ctx.closePath();
  ctx.fillStyle = opts&&opts.fill||'rgba(13,62,71,.12)';
  ctx.fill();
  // line
  ctx.beginPath();
  pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
  ctx.strokeStyle = opts&&opts.stroke||'#1A5C6B';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();
}

function downloadShareCard() {
  const S = T[lang];
  const {mins} = calcTax();
  const actual = simStats.tasksCompleted;
  const baseline = 9;
  const endF = Math.round(focus);
  const dpr = Math.min(window.devicePixelRatio||1,2);
  const W=600, H=360;
  const canvas = document.createElement('canvas');
  canvas.width=W*dpr; canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  // Background
  ctx.fillStyle='#0D3E47'; ctx.fillRect(0,0,W,H);
  // Accent bar
  ctx.fillStyle='#3A6B75'; ctx.fillRect(0,0,W,3);
  // Eyebrow
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.font='700 10px system-ui,sans-serif';
  ctx.fillText('ADHS SIMULATOR',32,40);
  ctx.textAlign='right';
  ctx.fillText('s\xfcdeifel.it',W-32,40);
  ctx.textAlign='left';
  // Headline
  ctx.fillStyle='#fff';
  ctx.font='700 22px system-ui,sans-serif';
  ctx.fillText(S.scTitle||'20 Minuten mit ADHS-Simulation',32,80);
  // 3 stat boxes
  const stats=[
    {n:`${actual}/${baseline}`, l:S.scTasks||'Aufgaben'},
    {n:`~${mins}`,              l:S.scMinL||'Min. verloren'},
    {n:`${endF}%`,              l:S.scFocusL||'Restfokus'},
  ];
  const bW=158, bH=82, bY=105, gap=12, bX0=32;
  stats.forEach((st,i)=>{
    const x=bX0+i*(bW+gap);
    ctx.fillStyle='rgba(255,255,255,.09)';
    ctx.fillRect(x,bY,bW,bH);
    ctx.fillStyle='#fff';
    ctx.font='800 30px system-ui,sans-serif';
    ctx.textAlign='center';
    ctx.fillText(st.n, x+bW/2, bY+46);
    ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.font='500 10px system-ui,sans-serif';
    ctx.fillText(st.l.toUpperCase(), x+bW/2, bY+64);
    ctx.textAlign='left';
  });
  // Sparkline
  const sp=simStats.focusSamples;
  if(sp.length>1){
    const sx=32,sy=220,sw=W-64,sh=88;
    ctx.fillStyle='rgba(255,255,255,.04)'; ctx.fillRect(sx,sy,sw,sh);
    ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(sx,sy+sh/2); ctx.lineTo(sx+sw,sy+sh/2); ctx.stroke();
    const step=sw/(sp.length-1);
    ctx.beginPath();
    sp.forEach((v,i)=>{
      const px=sx+i*step, py=sy+sh-(v/100)*sh;
      i?ctx.lineTo(px,py):ctx.moveTo(px,py);
    });
    ctx.strokeStyle='rgba(255,255,255,.65)'; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke();
    // fill under
    ctx.lineTo(sx+sw,sy+sh); ctx.lineTo(sx,sy+sh); ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fill();
    // labels
    ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.font='500 9px system-ui,sans-serif';
    ctx.fillText((S.sparkL||'Fokus-Verlauf').toUpperCase(), sx, sy+sh+14);
    ctx.textAlign='right';
    ctx.fillText('100%', sx-4, sy+10); ctx.fillText('0%', sx-4, sy+sh);
    ctx.textAlign='left';
  }
  // Footer
  ctx.fillStyle='rgba(255,255,255,.2)';
  ctx.font='500 9px system-ui,sans-serif';
  ctx.fillText(new Date().toLocaleDateString(lang==='de'?'de-DE':'en-US',{year:'numeric',month:'short',day:'numeric'}),32,H-16);
  if(medicationMode){ctx.textAlign='right';ctx.fillText('\ud83d\udc8a '+( S.medBadge||'Medikament aktiv'),W-32,H-16);ctx.textAlign='left';}
  const link=document.createElement('a');
  link.download=`adhs-simulation-${Date.now()}.png`;
  link.href=canvas.toDataURL('image/png');
  link.click();
}

function endSim(){
  if(phase==='debrief') return;
  phase='debrief';
  clearInterval(simTimer);
  allTO.forEach(clearTimeout); allTO=[];
  TM.stop();
  document.body.classList.remove('phase-moderate','phase-intense');
  SFX.stop();
  const m=String(Math.floor(ticks/60)).padStart(2,'0');
  const s=String(ticks%60).padStart(2,'0');
  const labels=T[lang].statLabels;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><big>${m}:${s}</big><small>${labels[0]}</small></div>
    <div class="stat"><big>${thoughtCount}</big><small>${labels[1]}</small></div>
    <div class="stat"><big>${notifCount}</big><small>${labels[2]}</small></div>
    <div class="stat"><big>${Math.round(100-focus)}%</big><small>${labels[3]}</small></div>
  `;
  // Build analysis sections
  buildTypeCard();
  buildTaxCard();
  buildCompare();
  buildShareCard();
  buildTrainerSection();

  document.getElementById('sym-grid').innerHTML=S.syms.map(s=>
    `<div class="sym"><em>${s.i}</em><h3>${s.t}</h3><p>${s.p}</p></div>`).join('');

  if(anecTitleEl&&S.anecTitle) anecTitleEl.textContent=S.anecTitle;

  clearInterval(simTimer);

// ── THEME & ACCESSIBILITY ─────────────────────
let currentTheme = (()=>{try{return localStorage.getItem('adhd_theme')||'default'}catch{return 'default'}})();
let dyslexicMode = (()=>{try{return localStorage.getItem('adhs_dyslexic')==='1'}catch{return false}})();

function setTheme(t) {
  currentTheme = t;
  if (t === 'default') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', t);
  }
  try { localStorage.setItem('adhd_theme', t); } catch {}
  document.querySelectorAll('.theme-swatch').forEach(el => {
    el.classList.toggle('active', el.dataset.theme === t);
  });
  const panel = document.getElementById('theme-panel');
  if (panel) setTimeout(()=>panel.classList.remove('show'), 180);
}

function toggleDyslexia() {
  dyslexicMode = !dyslexicMode;
  document.body.classList.toggle('dyslexic', dyslexicMode);
  try { localStorage.setItem('adhs_dyslexic', dyslexicMode ? '1' : '0'); } catch {}
  if (dyslexicMode && !document.getElementById('od-font')) {
    const link = document.createElement('link');
    link.id = 'od-font';
    link.rel = 'stylesheet';
    link.href = 'https://fonts.cdnfonts.com/css/opendyslexic';
    document.head.appendChild(link);
  }
  _syncDyslexiaBtns();
}

function _syncDyslexiaBtns() {
  document.querySelectorAll('.dyslexia-btn').forEach(btn => {
    btn.classList.toggle('active', dyslexicMode);
    btn.title = dyslexicMode ? 'Standardschrift' : 'OpenDyslexic';
  });
  const panelBtn = document.getElementById('dyslexia-btn-panel');
  if (panelBtn) panelBtn.textContent = dyslexicMode ? 'OpenDyslexic ✓' : 'Aa OpenDyslexic';
}

let _panelClickaway = null;
function toggleThemePanel() {
  const panel = document.getElementById('theme-panel');
  const isOpen = panel.classList.toggle('show');
  if (isOpen) {
    // close when clicking outside
    _panelClickaway = (e) => {
      if (!panel.contains(e.target) && e.target.id !== 'theme-topbar-btn') {
        panel.classList.remove('show');
        document.removeEventListener('click', _panelClickaway);
      }
    };
    setTimeout(() => document.addEventListener('click', _panelClickaway), 0);
  }
}

function _initPrefs() {
  // restore theme
  if (currentTheme !== 'default') {
    document.documentElement.setAttribute('data-theme', currentTheme);
    document.querySelectorAll('.theme-swatch').forEach(el => {
      el.classList.toggle('active', el.dataset.theme === currentTheme);
    });
  }
  // restore dyslexic mode
  if (dyslexicMode) {
    if (!document.getElementById('od-font')) {
      const link = document.createElement('link');
      link.id = 'od-font'; link.rel = 'stylesheet';
      link.href = 'https://fonts.cdnfonts.com/css/opendyslexic';
      document.head.appendChild(link);
    }
    document.body.classList.add('dyslexic');
    _syncDyslexiaBtns();
  }
}

// ── INIT ──────────────────────────────────────
_initPrefs();
setLang('de');
