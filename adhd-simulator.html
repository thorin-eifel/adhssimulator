<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADHD Simulator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f5f7;
  --card:rgba(255,255,255,0.72);
  --text:#19353E;
  --muted:#5E8090;
  --ctw-900:#0D3E47;
  --ctw-700:#1A5C6B;
  --ctw-500:#3A6B75;
  --ctw-400:#5E8090;
  --ctw-300:#7FA0A8;
  --ctw-100:#C5D8DC;
  --ctw-50:#EBF2F4;
  --red:#B91C1C;
  --green:#15803D;
  --shadow:0 1px 0 0 rgba(255,255,255,.7) inset,0 -1px 0 0 rgba(13,62,71,.04) inset,0 20px 40px -20px rgba(13,62,71,.25),0 8px 24px -12px rgba(13,62,71,.18);
  --shadow-lifted:0 1px 0 0 rgba(255,255,255,.85) inset,0 -1px 0 0 rgba(13,62,71,.05) inset,0 30px 60px -20px rgba(13,62,71,.32),0 12px 30px -10px rgba(13,62,71,.22);
  --r:16px;
}
body{font-family:'Nunito Sans','Avenir Next','Avenir',sans-serif;background:linear-gradient(160deg,#edf5f7 0%,#fdfbf8 50%,#f3f6f1 100%);color:var(--text);min-height:100vh;transition:filter .4s;-webkit-font-smoothing:antialiased}
.screen{display:none}.screen.active{display:block}
#welcome.active{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:100vh;padding:40px 20px;background:transparent}
.lang-row{display:flex;gap:8px;margin-bottom:20px}
.lang-btn{padding:6px 16px;border-radius:var(--r);border:2px solid #e5e7eb;background:var(--card);font-family:inherit;font-size:.82rem;cursor:pointer;transition:all .15s}
.lang-btn:hover{border-color:#aaa}
.lang-btn.sel{border-color:var(--ctw-900);background:var(--ctw-900);color:#fff}
.hero-icon{font-size:80px;animation:bob 3s ease-in-out infinite;margin-bottom:20px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.hero h1{font-size:clamp(2rem,6vw,3.5rem);font-weight:800;letter-spacing:-.5px;margin-bottom:10px;color:var(--ctw-900)}
.hero p{font-size:1.1rem;color:var(--muted);font-style:italic;margin-bottom:36px}
.feature-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:560px;margin-bottom:28px}
.feature{background:var(--card);border-radius:var(--r);border:1px solid var(--ctw-100);padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);text-align:left}
.feature em{font-size:26px;font-style:normal;display:block;margin-bottom:8px}
.feature strong{font-size:.85rem;display:block;margin-bottom:4px;color:var(--ctw-900)}
.feature span{font-size:.78rem;color:var(--ctw-400);line-height:1.4}
.manual-box{width:100%;max-width:560px;background:var(--card);border:1px solid var(--ctw-100);border-left:3px solid var(--ctw-700);padding:20px 22px 18px;margin-bottom:24px;text-align:left}
.manual-title{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--ctw-700);margin-bottom:14px}
.manual-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.manual-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--ctw-50)}
.manual-item:last-child{border-bottom:none}
.manual-ico{font-size:1.2rem;flex-shrink:0;margin-top:1px}
.manual-text strong{display:block;font-size:.78rem;font-weight:700;color:var(--ctw-900);margin-bottom:2px}
.manual-text span{font-size:.74rem;color:var(--ctw-400);line-height:1.45}
.note{max-width:520px;background:#FEF9EC;border:1px solid #D97706;border-radius:var(--r);padding:12px 16px;font-size:.8rem;color:#92400e;text-align:left;margin-bottom:28px}
.btn{background:var(--text);color:#fff;border:none;padding:15px 44px;font-size:1rem;font-family:inherit;border-radius:var(--r);cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.18);transition:transform .15s,box-shadow .15s}
.btn:hover{background:var(--ctw-700);box-shadow:0 4px 14px rgba(13,62,71,.25)}
.sc-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ctw-500);margin-bottom:10px}
.sc-pick{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;width:100%;max-width:560px;margin-bottom:24px}
.sc-pick .sc-btn:nth-child(5){grid-column:2}
.sc-btn{padding:9px 10px;border-radius:var(--r);border:2px solid #e5e7eb;background:var(--card);font-family:inherit;font-size:.82rem;cursor:pointer;transition:all .15s;color:var(--text);text-align:center;white-space:nowrap}
.sc-btn:hover{border-color:#aaa}
.sc-btn.sel{border-color:var(--ctw-900);background:var(--ctw-900);color:#fff}
.topbar{position:sticky;top:0;background:var(--ctw-900);border-bottom:1px solid var(--ctw-700);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;z-index:60}
.topbar-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.7)}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-timer{font-family:'SFMono-Regular','Consolas','Liberation Mono',monospace;font-size:.85rem;color:var(--muted);background:#f3f4f6;padding:3px 10px;border-radius:var(--r)}
.mute-btn{background:none;border:1.5px solid rgba(255,255,255,.3);border-radius:var(--r);padding:3px 10px;cursor:pointer;font-size:1rem;line-height:1.4;transition:border-color .15s}
.mute-btn:hover{border-color:#aaa}
.main{max-width:660px;margin:0 auto;padding:36px 20px 160px}
.task-eyebrow{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--ctw-500);margin-bottom:6px}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--ctw-100);padding:26px 28px;box-shadow:var(--shadow);margin-bottom:18px}
.card h2{font-size:1rem;font-weight:700;margin-bottom:14px;color:var(--ctw-900)}
.card p{line-height:1.85;color:var(--text);font-size:.96rem}
.thought{position:fixed;background:#faf5ff;border:2px solid var(--ctw-300);border-radius:var(--r);padding:16px 44px 16px 18px;width:min(20vw,260px);min-width:180px;font-size:clamp(.9rem,1.5vw,1.1rem);color:var(--ctw-900);line-height:1.55;font-style:italic;box-shadow:0 6px 28px rgba(124,58,237,.28);z-index:500;animation:pop .35s cubic-bezier(.34,1.56,.64,1)}
.thought::before{content:'💭 ';font-style:normal;font-size:.9em}
.thought .x{position:absolute;top:-9px;right:-9px;width:22px;height:22px;background:var(--ctw-700);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-style:normal;cursor:pointer}
@keyframes pop{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
.notif-tray{position:fixed;top:62px;right:14px;width:290px;z-index:600;display:flex;flex-direction:column;gap:8px}
.notif{background:var(--card);border-radius:var(--r);border:1px solid var(--ctw-100);padding:11px 13px;display:flex;gap:10px;align-items:flex-start;border:1px solid #f0f0f0;cursor:pointer;animation:slideR .3s ease}
@keyframes slideR{from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
.notif-ico{font-size:22px;flex-shrink:0}
.notif-app{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.notif-msg{font-size:.8rem;line-height:1.35;margin-top:2px}
#meter{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);width:min(320px,88vw);background:rgba(255,255,255,.95);border-radius:var(--r);border:1px solid var(--ctw-100);padding:12px 16px;box-shadow:var(--shadow);z-index:400}
.m-row{display:flex;justify-content:space-between;margin-bottom:8px}
.m-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ctw-500)}
.m-val{font-size:.68rem;font-weight:700;color:var(--muted);font-family:monospace}
.m-track{height:6px;background:var(--ctw-100);border-radius:var(--r);overflow:hidden}
#m-bar{height:100%;border-radius:var(--r);background:var(--green);width:100%;transition:width .7s ease,background .7s}
.m-mood{font-size:.73rem;color:var(--muted);margin-top:7px;text-align:center;min-height:1.1em;font-style:italic}
#tasklist{position:fixed;left:14px;top:50%;transform:translateY(-50%);width:185px;background:var(--card);border-radius:var(--r);border:1px solid var(--ctw-100);padding:13px 14px;z-index:400;opacity:0;transition:opacity .5s;pointer-events:none}
#tasklist.show{opacity:1;pointer-events:auto}
.tl-header{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ctw-500);margin-bottom:9px}
.tl-item{font-size:.78rem;padding:4px 0;border-bottom:1px solid var(--ctw-50);color:var(--ctw-400);display:flex;align-items:center;gap:7px;line-height:1.3}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:6px;height:6px;border-radius:50%;background:#d1d5db;flex-shrink:0}
.tl-item.hot{color:var(--ctw-900);font-weight:700}.tl-item.hot .tl-dot{background:var(--ctw-700)}
#fact{position:fixed;bottom:98px;right:14px;width:230px;background:#fffbeb;border:2px solid #fbbf24;border-radius:var(--r);border:2px solid #D97706;padding:13px;z-index:400;cursor:pointer;opacity:0;transition:opacity .4s;pointer-events:none}
#fact.show{opacity:1;pointer-events:auto}
.fact-badge{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ctw-700);margin-bottom:6px}
.fact-body{font-size:.8rem;line-height:1.45;color:#444}
.fact-more{font-size:.75rem;font-weight:700;color:var(--ctw-700);margin-top:7px}
#fidget{position:fixed;left:14px;bottom:100px;width:52px;height:52px;border-radius:var(--r);background:var(--ctw-50);border:2px solid var(--ctw-300);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:400;box-shadow:0 2px 12px rgba(13,62,71,.2);opacity:0;transition:opacity .4s,transform .15s;pointer-events:none}
#fidget.show{opacity:1;pointer-events:auto}
#fidget:active{transform:scale(.88)}
#shock{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s}
#shock.show{opacity:1;pointer-events:auto}
.shock-card{background:var(--ctw-900);color:#fff;border-radius:var(--r);border-top:3px solid var(--ctw-100);padding:28px 40px;text-align:center;animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
.shock-card h2{font-size:1.6rem}
.shock-card .sub{color:#aaa;margin-top:6px;font-size:.9rem}
.shock-card .sub2{color:#666;font-size:.8rem;margin-top:4px}
body.phase-moderate{filter:contrast(1.04) saturate(1.05)}
body.phase-intense{filter:contrast(1.08) saturate(1.1)}
body.phase-intense .card{animation:flicker 3s infinite}
@keyframes flicker{0%,100%{opacity:1}48%{opacity:.93}50%{opacity:1}95%{opacity:.91}97%{opacity:1}}
#debrief.active{display:block;padding:48px 20px 80px;max-width:800px;margin:0 auto}
.db-head{text-align:center;margin-bottom:36px}
.db-head h2{font-size:2rem;font-weight:800;margin-bottom:8px;color:var(--ctw-900)}
.db-head p{color:var(--ctw-400)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:36px}
.stat{background:var(--card);border-radius:var(--r);border:1px solid var(--ctw-100);padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.stat big{display:block;font-size:2.2rem;font-weight:800;font-family:'SFMono-Regular','Consolas','Liberation Mono',monospace;color:var(--ctw-900)}
.stat small{font-size:.72rem;color:var(--muted);margin-top:3px;display:block}
.sym-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px;margin-bottom:36px}
.sym{background:var(--card);border-radius:var(--r);border:1px solid var(--ctw-100);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.sym em{font-size:26px;font-style:normal;display:block;margin-bottom:8px}
.sym h3{font-size:.9rem;font-weight:700;margin-bottom:6px;color:var(--ctw-900)}
.sym p{font-size:.8rem;line-height:1.55;color:var(--ctw-400)}
.db-foot{text-align:center}
.db-foot p{color:var(--ctw-400);font-size:.88rem;margin-bottom:20px;max-width:560px;margin-inline:auto}
.anec-section{margin-bottom:40px}
.anec-section-title{font-size:1.1rem;font-weight:700;margin-bottom:6px;color:var(--ctw-900)}
.anec-section-sub{font-size:.82rem;color:var(--ctw-400);margin-bottom:18px}
.anec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:12px}
.anec-card{background:var(--card);border-radius:var(--r);border-left:3px solid var(--ctw-700);padding:20px 22px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-left:3px solid var(--purple);position:relative}
.anec-card p{font-size:.87rem;line-height:1.7;color:#444;font-style:italic}
.anec-card p::before{content:'"';font-size:2rem;line-height:0;vertical-align:-.5rem;color:var(--ctw-300);margin-right:3px}
.anec-card p::after{content:'"';font-size:2rem;line-height:0;vertical-align:-.5rem;color:var(--ctw-300);margin-left:3px}
@media(max-width:600px){#tasklist,#fact,#fidget{display:none}}
.task-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.task-cd{font-family:'SFMono-Regular','Consolas','Liberation Mono',monospace;font-size:1.5rem;font-weight:800;color:var(--muted);transition:color .3s;min-width:3rem;text-align:right}
.task-cd.warn{color:#ea580c}.task-cd.urgent{color:#dc2626}
.tp-dots{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px}
.tp-dot{width:9px;height:9px;border-radius:0;background:#e5e7eb;transition:all .3s;flex-shrink:0}
.tp-dot.done{background:var(--ctw-700)}
.tp-dot.cur{transform:scale(1.5)}
.tp-dot.cur.qt{background:var(--ctw-700)}.tp-dot.cur.em{background:#B45309}.tp-dot.cur.mm{background:var(--ctw-500)}
.task-badge{display:inline-block;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding:3px 10px;border-radius:var(--r);margin-bottom:12px}
.qt-badge{background:var(--ctw-50);color:var(--ctw-900);border:1px solid var(--ctw-300)}.em-badge{background:#FEF3C7;color:#92400e;border:1px solid #FDE68A}.mm-badge{background:var(--ctw-50);color:var(--ctw-700);border:1px solid var(--ctw-100)}
.task-q{font-size:1.15rem;font-weight:700;line-height:1.4;margin-bottom:8px}
.task-hint{font-size:.82rem;color:var(--ctw-400);font-style:italic;margin-bottom:8px}
.task-ta{width:100%;border:1.5px solid var(--ctw-100);border-radius:var(--r);padding:10px 12px;font-family:inherit;font-size:.93rem;resize:vertical;min-height:80px;margin-top:8px;transition:border-color .2s}
.task-ta:focus{outline:none;border-color:var(--ctw-700)}
.email-meta{background:var(--ctw-50);border:1px solid var(--ctw-100);border-radius:var(--r);padding:10px 13px;margin-bottom:12px;font-size:.82rem}
.email-meta>div{padding:2px 0}
.em-lbl{color:var(--ctw-500);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-right:5px}
.email-body{font-size:.88rem;line-height:1.75;color:var(--text);padding:10px 0;border-top:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;margin-bottom:10px;white-space:pre-wrap;max-height:170px;overflow-y:auto}
.reply-lbl{font-size:.75rem;font-weight:700;color:var(--ctw-500);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.mem-items{display:flex;flex-wrap:wrap;gap:9px;margin:12px 0}
.mem-item{background:var(--ctw-50);border-radius:var(--r);border:1px solid var(--ctw-100);padding:8px 14px;font-size:1rem;font-weight:700;letter-spacing:.5px}
.mem-num{font-size:2.4rem;font-weight:800;letter-spacing:.4em;text-align:center;padding:18px 8px;font-family:'SFMono-Regular','Consolas','Liberation Mono',monospace;color:var(--text)}
.mem-pairs{display:grid;gap:8px;margin:12px 0}
.mem-pair{display:flex;align-items:center;gap:10px;background:var(--ctw-50);border:1px solid var(--ctw-100);padding:8px 12px;border-radius:var(--r);font-size:.9rem}
.mem-pair strong{min-width:90px}
.mem-story{background:var(--ctw-50);border:1px solid var(--ctw-100);border-radius:var(--r);padding:13px 15px;font-size:.9rem;line-height:1.8;color:#333;margin:10px 0}
.mem-warn{font-size:.75rem;color:var(--ctw-400);font-style:italic;margin-top:10px;text-align:center}
.story-qs{display:grid;gap:10px;margin-top:6px}
.story-q>p{font-size:.86rem;font-weight:600;margin-bottom:4px;color:var(--ctw-900)}
.story-q .task-ta{min-height:44px}
.task-sub-btn{width:100%;padding:13px;margin-top:12px;background:var(--ctw-900);color:#fff;border:none;border-radius:var(--r);letter-spacing:.04em;font-weight:700;text-transform:uppercase;font-family:inherit;font-size:1rem;cursor:pointer;transition:background .2s}
.task-sub-btn:hover{background:var(--ctw-700)}
.task-sub-btn:disabled{background:var(--ctw-300);cursor:default}
.lang-row{direction:ltr}

/* ── Calibration end overlay ─── */
#calib-end{position:fixed;inset:0;background:var(--ctw-900);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1100;opacity:0;pointer-events:none;transition:opacity .6s;text-align:center;padding:40px}
#calib-end.show{opacity:1;pointer-events:auto}
.ce-h2{font-size:1.7rem;font-weight:800;color:#fff;margin-bottom:14px;line-height:1.3}
.ce-p{color:var(--ctw-100);font-size:.95rem;max-width:420px;line-height:1.6}
/* ── Medication badge in topbar ─── */
#med-badge{display:none;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ctw-900);background:var(--ctw-100);padding:2px 9px;border-radius:var(--r);margin-right:6px;vertical-align:middle}
#med-badge.show{display:inline-block}
/* ── Medication wear-off banner ─── */
#med-wearoff{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:9px 22px;font-size:.78rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;z-index:900;opacity:0;pointer-events:none;transition:opacity .4s;border-radius:var(--r);white-space:nowrap}
#med-wearoff.show{opacity:1}
/* ── Medication toggle on welcome ─── */
.med-toggle{display:flex;align-items:center;gap:9px;padding:10px 20px;border:2px solid var(--ctw-100);background:var(--card);color:var(--ctw-400);font-family:inherit;font-size:.84rem;cursor:pointer;border-radius:var(--r);margin-bottom:16px;transition:all .2s;width:100%;max-width:560px;justify-content:center}
.med-toggle.active{border-color:var(--ctw-700);background:var(--ctw-50);color:var(--ctw-900);font-weight:700}
.med-dot{width:10px;height:10px;border-radius:50%;background:#d1d5db;flex-shrink:0;transition:background .2s}
.med-toggle.active .med-dot{background:var(--ctw-700)}
/* ── Coworker popup ─── */
#coworker{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);width:min(360px,90vw);background:var(--ctw-900);color:#fff;padding:16px 18px 14px;z-index:700;box-shadow:0 8px 32px rgba(13,62,71,.4);opacity:0;pointer-events:none;transition:opacity .3s;border-left:3px solid var(--ctw-300);border-radius:var(--r)}
#coworker.show{opacity:1;pointer-events:auto;animation:cwPop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes cwPop{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.cw-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cw-avatar{font-size:1.3rem;flex-shrink:0}
.cw-name{font-size:.68rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ctw-100)}
.cw-appname{font-size:.58rem;color:rgba(255,255,255,.4);margin-top:2px}
.cw-msg{font-size:.87rem;line-height:1.6;color:#fff;margin-bottom:12px}
.cw-actions{display:flex;gap:8px}
.cw-btn{flex:1;padding:7px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#fff;font-family:inherit;font-size:.74rem;cursor:pointer;border-radius:var(--r);transition:background .15s;text-align:center}
.cw-btn:hover{background:rgba(255,255,255,.18)}
/* ── Hyperfocus task ─── */
.hyper-card{background:var(--card);border-radius:var(--r);border:2px solid #D97706;padding:24px 28px;box-shadow:0 2px 16px rgba(217,119,6,.12)}
.hyper-badge{display:inline-block;font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;padding:3px 10px;border-radius:var(--r);background:#FEF3C7;color:#92400e;border:1px solid #FDE68A;margin-bottom:12px}
.hyper-article{font-size:.92rem;line-height:1.9;color:var(--text);margin-bottom:16px}
.hyper-more{display:inline-block;font-size:.8rem;font-weight:700;color:#D97706;cursor:pointer;padding:6px 14px;border:1px solid #FDE68A;border-radius:var(--r);transition:background .2s;margin-bottom:6px}
.hyper-more:hover{background:#FEF3C7}
.hyper-note{font-size:.7rem;color:var(--ctw-400);font-style:italic;margin-top:10px}


/* ── ADHS Tax Card ────────────────────────── */
.tax-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin:24px 0}
.tax-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:16px}
.tax-hdr-left{flex:1}
.tax-name{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ctw-900)}
.tax-sub{font-size:.75rem;color:var(--ctw-400);margin-top:3px}
.tax-total{text-align:right;flex-shrink:0}
.tax-total-num{font-size:2.2rem;font-weight:800;color:var(--ctw-900);line-height:1}
.tax-total-lbl{font-size:.62rem;color:var(--ctw-400);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.tax-rows{margin-bottom:12px}
.tax-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.8rem;color:var(--text)}
.tax-row:last-child{border-bottom:none}
.tax-row-icon{flex-shrink:0;width:20px;text-align:center}
.tax-row-lbl{flex:1}
.tax-row-val{font-weight:700;color:var(--ctw-700);white-space:nowrap}
.tax-bar-row{display:flex;align-items:center;gap:10px;margin-top:14px}
.tax-bar-lbl{font-size:.68rem;color:var(--ctw-400);flex-shrink:0;white-space:nowrap}
.tax-bar-track{flex:1;height:6px;background:var(--border);border-radius:var(--r);overflow:hidden}
.tax-bar-fill{height:100%;background:var(--ctw-700);border-radius:var(--r);transition:width 1.2s .3s ease}
.tax-bar-pct{font-size:.7rem;font-weight:700;color:var(--ctw-700);flex-shrink:0;min-width:30px;text-align:right}
/* ── Comparison ─────────────────────────────── */
.cmp-section{margin:24px 0}
.cmp-heading{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ctw-900);margin-bottom:14px}
.cmp-grid{display:grid;grid-template-columns:1fr 1px 1fr;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cmp-col{padding:18px 20px}
.cmp-divider{background:var(--border)}
.cmp-col-lbl{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--ctw-400);margin-bottom:10px}
.cmp-tasks{display:flex;align-items:baseline;gap:4px;margin-bottom:8px}
.cmp-tasks-big{font-size:2.2rem;font-weight:800;color:var(--ctw-900);line-height:1}
.cmp-tasks-of{font-size:.8rem;color:var(--ctw-400)}
.cmp-tasks-big.cmp-base{color:var(--ctw-500)}
.cmp-fbar-wrap{margin-bottom:6px}
.cmp-fbar-track{height:8px;background:var(--border);border-radius:var(--r);overflow:hidden}
.cmp-fbar-fill{height:100%;border-radius:var(--r);transition:width 1s .4s ease}
.cmp-fbar-good{background:#15803D}
.cmp-fbar-lbl{font-size:.7rem;color:var(--text);margin-top:4px}
.cmp-timelost{font-size:.7rem;font-weight:700;color:var(--ctw-400);margin-top:6px}
/* ── Focus sparkline (debrief) ───────────────── */
.spark-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin:20px 0}
.spark-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--ctw-400);margin-bottom:8px}
#debrief-spark{width:100%;height:56px;display:block}
/* ── Share card ─────────────────────────────── */
.share-section{margin:28px 0;text-align:center}
.share-card-preview{background:var(--ctw-900);color:#fff;border-radius:var(--r);padding:24px 26px;max-width:520px;margin:0 auto 14px;position:relative;border-top:3px solid var(--ctw-300)}
.sc-eyebrow{display:flex;justify-content:space-between;font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.35);margin-bottom:12px}
.sc-title{font-size:1.15rem;font-weight:800;color:#fff;margin-bottom:16px;line-height:1.3}
.sc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.sc-stat{background:rgba(255,255,255,.08);padding:10px 6px;border-radius:var(--r);text-align:center}
.sc-stat-n{font-size:1.5rem;font-weight:800;color:#fff;line-height:1;margin-bottom:2px}
.sc-stat-l{font-size:.58rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px}
.sc-spark{display:block;width:100%;height:40px}
.share-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;background:var(--ctw-900);color:#fff;border:none;font-family:inherit;font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border-radius:var(--r);transition:background .2s}
.share-btn:hover{background:var(--ctw-700)}


/* ── Option groups (Diff / Type) ─────────────── */
.opt-group{width:100%;max-width:560px;margin-bottom:14px}
.opt-lbl{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ctw-400);margin-bottom:8px}
.opt-btns{display:flex;gap:8px}
.opt-btn{flex:1;padding:9px 6px;border:2px solid var(--ctw-100);background:var(--card);color:var(--ctw-400);font-family:inherit;font-size:.8rem;cursor:pointer;border-radius:var(--r);transition:all .18s;line-height:1.3;text-align:center}
.opt-btn:hover{border-color:var(--ctw-400);color:var(--ctw-700)}
.opt-btn.active{border-color:var(--ctw-900);background:var(--ctw-900);color:#fff;font-weight:700}
/* ── Toggle row (Med + Trainer) ──────────────── */
.toggle-row{display:flex;gap:10px;width:100%;max-width:560px;margin-bottom:16px}
.toggle-row .med-toggle{flex:1;margin-bottom:0}
/* ── Hyperactive fidget urgency ──────────────── */
.fidget-urgent{animation:fidgetPulse 2.2s ease-in-out infinite}
@keyframes fidgetPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05);box-shadow:0 0 14px rgba(217,119,6,.35)}}
/* ── Type debrief card ───────────────────────── */
#type-section{margin:20px 0}
.type-db-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 22px;border-left:4px solid var(--ctw-700)}
.type-db-badge{display:inline-block;font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;padding:2px 9px;background:var(--ctw-50);color:var(--ctw-700);border-radius:var(--r);margin-bottom:8px}
.type-db-title{font-size:.95rem;font-weight:800;color:var(--ctw-900);margin-bottom:6px}
.type-db-body{font-size:.82rem;line-height:1.75;color:var(--text)}
/* ── Trainer section ─────────────────────────── */
#trainer-section{margin:28px 0;display:none}
#trainer-section.show{display:block}
.trainer-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.trainer-title{font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ctw-900)}
.trainer-ctx{display:flex;gap:7px;margin-bottom:18px}
.trainer-ctx-btn{padding:5px 14px;border:1px solid var(--ctw-100);background:var(--card);color:var(--ctw-400);font-family:inherit;font-size:.75rem;cursor:pointer;border-radius:var(--r);transition:all .15s}
.trainer-ctx-btn.active{border-color:var(--ctw-700);background:var(--ctw-50);color:var(--ctw-900);font-weight:700}
.trainer-qs{margin-bottom:18px}
.trainer-q{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:.82rem;line-height:1.65;color:var(--text)}
.trainer-q:last-child{border-bottom:none}
.trainer-q-num{flex-shrink:0;width:20px;font-weight:800;color:var(--ctw-400);font-size:.75rem;padding-top:2px}
.trainer-tip-list{list-style:none;padding:0;margin:0 0 18px}
.trainer-tip-list li{padding:6px 0;border-bottom:1px solid var(--border);font-size:.8rem;color:var(--text);line-height:1.6}
.trainer-tip-list li::before{content:'→ ';color:var(--ctw-500);font-weight:700}
.trainer-tip-list li:last-child{border-bottom:none}
.trainer-section-title{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--ctw-400);margin:12px 0 8px}
.trainer-res a{color:var(--ctw-700);font-size:.8rem;text-decoration:none;display:block;padding:4px 0}
.trainer-res a:hover{text-decoration:underline}
.trainer-print-btn{margin-top:14px;padding:9px 20px;border:1px solid var(--ctw-100);background:var(--card);color:var(--ctw-500);font-family:inherit;font-size:.78rem;cursor:pointer;border-radius:var(--r);transition:all .2s}
.trainer-print-btn:hover{border-color:var(--ctw-700);color:var(--ctw-900)}
@media print{.simulation,.welcome,.topbar,.db-foot{display:none!important}#trainer-section{display:block!important}}

[data-theme="midnight"] .btn,[data-theme="midnight"] .task-sub-btn{background:#1f6feb!important;color:#fff!important}

[data-theme="midnight"] .sc-btn.sel,[data-theme="midnight"] .lang-btn.sel,[data-theme="midnight"] .opt-btn.active{background:#1f6feb!important;border-color:#388bfd!important;color:#fff!important}

/* ── OpenDyslexic font ───────────────────────── */
body.dyslexic,body.dyslexic *:not(.task-cd):not(.m-val):not(.topbar-timer):not(.mem-num){
  font-family:'OpenDyslexic',sans-serif!important;
  line-height:1.95!important;letter-spacing:.03em;word-spacing:.12em;
}

/* ── Theme bar (welcome) ─────────────────────── */
.theme-bar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.tb-group{display:flex;align-items:center;gap:6px}
.tb-label{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ctw-400)}
.theme-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .18s,box-shadow .18s;flex-shrink:0;padding:0}
.theme-swatch:hover{transform:scale(1.25)}
.theme-swatch.active{border-color:var(--ctw-900)!important;transform:scale(1.15);box-shadow:0 0 0 2px var(--card),0 0 0 4.5px var(--ctw-900)}
.dyslexia-btn{padding:4px 11px;border-radius:var(--r);border:2px solid var(--ctw-100);background:var(--card);font-family:inherit;font-size:.76rem;font-weight:700;cursor:pointer;color:var(--ctw-500);transition:all .15s;letter-spacing:.03em;white-space:nowrap}
.dyslexia-btn:hover{border-color:var(--ctw-400);color:var(--ctw-700)}
.dyslexia-btn.active{border-color:var(--ctw-700);background:var(--ctw-50);color:var(--ctw-900)}
body.dyslexic .dyslexia-btn{font-family:'OpenDyslexic',sans-serif!important}

/* ── Floating theme panel (sim topbar) ───────── */
.theme-topbar-btn{background:none;border:1.5px solid rgba(255,255,255,.25);border-radius:var(--r);padding:3px 8px;cursor:pointer;font-size:.88rem;line-height:1.4;transition:border-color .15s;color:#fff;display:flex;align-items:center}
.theme-topbar-btn:hover{border-color:rgba(255,255,255,.6)}
#theme-panel{position:fixed;top:50px;right:14px;background:var(--card);border:1px solid var(--ctw-100);border-radius:var(--r);padding:12px 14px;z-index:810;box-shadow:0 8px 32px rgba(0,0,0,.18);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;transform:translateY(-6px);display:flex;flex-direction:column;gap:10px;min-width:170px}
#theme-panel.show{opacity:1;pointer-events:auto;transform:translateY(0)}
.tp-row-lbl{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--ctw-500)}
.tp-swatches{display:flex;gap:6px;flex-wrap:wrap}
.tp-dy-btn{width:100%;padding:6px 10px;border-radius:var(--r);border:1.5px solid var(--ctw-100);background:var(--card);font-family:inherit;font-size:.76rem;font-weight:700;cursor:pointer;color:var(--ctw-500);transition:all .15s;text-align:left}
.tp-dy-btn:hover{border-color:var(--ctw-400)}
.tp-dy-btn.active{border-color:var(--ctw-700);background:var(--ctw-50);color:var(--ctw-900)}
body.dyslexic .tp-dy-btn{font-family:'OpenDyslexic',sans-serif!important}


/* ── Pause button (topbar) ─────────────────── */
#pause-btn{background:transparent;border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.65);font-size:.75rem;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border-radius:var(--r);transition:all .15s;flex-shrink:0;padding:0;font-family:inherit;margin-right:2px}
#pause-btn:hover{background:rgba(255,255,255,.12);color:#fff}
#pause-btn.paused{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.5)}
/* ── Pause overlay ─────────────────────────── */
#pause-overlay{position:fixed;inset:0;background:rgba(13,62,71,.88);display:flex;align-items:center;justify-content:center;z-index:850;opacity:0;pointer-events:none;transition:opacity .28s;backdrop-filter:blur(3px)}
#pause-overlay.show{opacity:1;pointer-events:auto}
.pause-card{background:var(--ctw-900);color:#fff;padding:32px 42px;border-radius:var(--r);text-align:center;border-top:3px solid var(--ctw-300);box-shadow:0 16px 48px rgba(0,0,0,.35)}
.pause-icon{font-size:2rem;margin-bottom:10px;opacity:.7}
.pause-lbl{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:2.5px;color:rgba(255,255,255,.5);margin-bottom:4px}
.pause-cost{font-size:.85rem;color:#FCA5A5;margin-bottom:22px;font-weight:700}
.pause-resume-btn{padding:11px 28px;background:var(--ctw-500);color:#fff;border:none;font-family:inherit;font-size:.82rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border-radius:var(--r);transition:background .15s}
.pause-resume-btn:hover{background:var(--ctw-300)}

/* ── Button & radius polish ─────────────────────────────────────── */
/* Pill radius for all option + soundscape buttons */
.opt-btn,.sc-btn,.lang-btn{border-radius:999px!important}
/* Unselected: clean white pill */
.opt-btn,.sc-btn{
  background:rgba(255,255,255,.6)!important;
  border:2px solid rgba(255,255,255,.8)!important;
  color:var(--ctw-700)!important;
  box-shadow:0 1px 4px rgba(13,62,71,.08)!important;
}
.opt-btn:hover,.sc-btn:hover{background:rgba(255,255,255,.9)!important;border-color:rgba(255,255,255,1)!important}
/* Selected: dark teal pill */
.opt-btn.active,.sc-btn.sel{
  background:var(--ctw-900)!important;border-color:var(--ctw-900)!important;
  color:#fff!important;font-weight:700!important;
  box-shadow:0 4px 14px rgba(13,62,71,.28)!important;
}
/* Start button: full-width pill */
#ui-begin{
  width:100%!important;max-width:560px!important;
  padding:15px 20px!important;border-radius:999px!important;
  box-shadow:0 4px 20px rgba(13,62,71,.3),0 1px 0 rgba(255,255,255,.15) inset!important;
  font-size:1.05rem!important;font-weight:800!important;letter-spacing:.02em!important;
}
#ui-begin:hover{transform:translateY(-2px)!important;box-shadow:0 8px 24px rgba(13,62,71,.35),0 1px 0 rgba(255,255,255,.15) inset!important}
/* med-toggle pill */
.med-toggle{border-radius:999px!important;border:2px solid rgba(255,255,255,.8)!important}

/* ── Glass-morphism design refresh ─────────────────────────────── */
.feature,.card,.stat,.sym,.manual-box,.notif,#meter,#tasklist,.med-toggle{
  background:linear-gradient(180deg,rgba(255,255,255,.78),rgba(255,255,255,.52))!important;
  backdrop-filter:blur(24px) saturate(160%)!important;
  -webkit-backdrop-filter:blur(24px) saturate(160%)!important;
  border:1px solid rgba(255,255,255,.72)!important;
  box-shadow:var(--shadow)!important;
}
.feature:hover,.card:hover{box-shadow:var(--shadow-lifted)!important}

.anec-card{

/* task textarea border */
.task-ta{background:rgba(255,255,255,.6);border-color:rgba(255,255,255,.8)}

/* lang + sc buttons */
.lang-btn,.sc-btn{background:rgba(255,255,255,.6)!important;border-color:rgba(255,255,255,.8)!important}
.lang-btn.sel,.sc-btn.sel{background:var(--ctw-900)!important;border-color:var(--ctw-900)!important;color:#fff!important}
/* mem items */
.mem-item,.mem-pair,.mem-story,.email-meta{background:rgba(255,255,255,.55)!important;border-color:rgba(255,255,255,.7)!important}
/* Orbs */
body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0}
body::before{width:46vw;height:46vw;background:oklch(.78 .08 210);opacity:.08;top:-12vw;left:-10vw;filter:blur(70px)}
body::after{width:38vw;height:38vw;background:oklch(.85 .06 35);opacity:.06;bottom:-14vw;right:-8vw;filter:blur(70px)}
/* ensure all screens sit above orbs */
.screen,.topbar,#meter,#tasklist,#fact,#fidget,#coworker,.thought,.notif-tray,#calib-end,#shock,#pause-overlay{position:relative;z-index:1}

  {type:'quiz',en:{q:"At what temperature does water boil at sea level? (°C)"},de:{q:"Bei welcher Temperatur kocht Wasser auf Meereshöhe? (°C)"},fr:{q:"À quelle température l'eau bout-elle au niveau de la mer ? (°C)"},es:{q:"¿A qué temperatura hierve el agua a nivel del mar? (°C)"},it:{q:"A quale temperatura bolle l'acqua al livello del mare? (°C)"},ar:{q:"عند أي درجة حرارة يغلي الماء على مستوى سطح البحر؟"}},
  {type:'quiz',en:{q:"How many sides does a hexagon have?"},de:{q:"Wie viele Seiten hat ein Sechseck?"},fr:{q:"Combien de côtés a un hexagone ?"},es:{q:"¿Cuántos lados tiene un hexágono?"},it:{q:"Quanti lati ha un esagono?"},ar:{q:"كم ضلع للمسدس؟"}},
  {type:'quiz',en:{q:"What is the tallest mountain on Earth?"},de:{q:"Was ist der höchste Berg der Erde?"},fr:{q:"Quelle est la plus haute montagne du monde ?"},es:{q:"¿Cuál es la montaña más alta de la Tierra?"},it:{q:"Qual è la montagna più alta della Terra?"},ar:{q:"ما هو أعلى جبل في العالم؟"}},
  {type:'quiz',en:{q:"In what year did the Berlin Wall fall?"},de:{q:"In welchem Jahr fiel die Berliner Mauer?"},fr:{q:"En quelle année le mur de Berlin est-il tombé ?"},es:{q:"¿En qué año cayó el Muro de Berlín?"},it:{q:"In che anno è caduto il Muro di Berlino?"},ar:{q:"في أي عام سقط جدار برلين؟"}},
  {type:'quiz',en:{q:"What is the chemical formula for water?"},de:{q:"Was ist die chemische Formel für Wasser?"},fr:{q:"Quelle est la formule chimique de l'eau ?"},es:{q:"¿Cuál es la fórmula química del agua?"},it:{q:"Qual è la formula chimica dell'acqua?"},ar:{q:"ما هي الصيغة الكيميائية للماء؟"}},
  {type:'quiz',en:{q:"Who is credited with inventing the telephone?"},de:{q:"Wem wird die Erfindung des Telefons zugeschrieben?"},fr:{q:"À qui attribue-t-on l'invention du téléphone ?"},es:{q:"¿A quién se le atribuye la invención del teléfono?"},it:{q:"A chi viene attribuita l'invenzione del telefono?"},ar:{q:"من يُنسب إليه اختراع الهاتف؟"}},
  {type:'quiz',en:{q:"What is the capital of Brazil?"},de:{q:"Was ist die Hauptstadt von Brasilien?"},fr:{q:"Quelle est la capitale du Brésil ?"},es:{q:"¿Cuál es la capital de Brasil?"},it:{q:"Qual è la capitale del Brasile?"},ar:{q:"ما هي عاصمة البرازيل؟"}},
  {type:'quiz',en:{q:"What is the square root of 144?"},de:{q:"Was ist die Quadratwurzel von 144?"},fr:{q:"Quelle est la racine carrée de 144 ?"},es:{q:"¿Cuál es la raíz cuadrada de 144?"},it:{q:"Qual è la radice quadrata di 144?"},ar:{q:"ما هو الجذر التربيعي لـ 144؟"}},
  {type:'quiz',en:{q:"What is the smallest prime number?"},de:{q:"Was ist die kleinste Primzahl?"},fr:{q:"Quel est le plus petit nombre premier ?"},es:{q:"¿Cuál es el número primo más pequeño?"},it:{q:"Qual è il numero primo più piccolo?"},ar:{q:"ما هو أصغر عدد أولي؟"}},
  {type:'quiz',en:{q:"Who was the first person to walk on the moon?"},de:{q:"Wer war der erste Mensch auf dem Mond?"},fr:{q:"Qui a été la première personne à marcher sur la Lune ?"},es:{q:"¿Quién fue la primera persona en caminar en la Luna?"},it:{q:"Chi è stata la prima persona a camminare sulla Luna?"},ar:{q:"من كان أول شخص يمشي على سطح القمر؟"}},
  {type:'quiz',en:{q:"What is the currency of Japan?"},de:{q:"Was ist die Währung Japans?"},fr:{q:"Quelle est la monnaie du Japon ?"},es:{q:"¿Cuál es la moneda de Japón?"},it:{q:"Qual è la valuta del Giappone?"},ar:{q:"ما هي عملة اليابان؟"}},
  {type:'quiz',en:{q:"What gas do plants mainly absorb for photosynthesis?"},de:{q:"Welches Gas nehmen Pflanzen hauptsächlich für die Fotosynthese auf?"},fr:{q:"Quel gaz les plantes absorbent-elles pour la photosynthèse ?"},es:{q:"¿Qué gas absorben las plantas para la fotosíntesis?"},it:{q:"Quale gas assorbono le piante per la fotosintesi?"},ar:{q:"ما هو الغاز الذي تمتصه النباتات للتمثيل الضوئي؟"}},
  {type:'quiz',en:{q:"In what year did the Titanic sink?"},de:{q:"In welchem Jahr versank die Titanic?"},fr:{q:"En quelle année le Titanic a-t-il coulé ?"},es:{q:"¿En qué año se hundió el Titanic?"},it:{q:"In che anno affondò il Titanic?"},ar:{q:"في أي عام غرقت سفينة تيتانيك؟"}},
  {type:'quiz',en:{q:"How many degrees are in a full circle?"},de:{q:"Wie viele Grad hat ein Vollkreis?"},fr:{q:"Combien de degrés y a-t-il dans un cercle complet ?"},es:{q:"¿Cuántos grados tiene un círculo completo?"},it:{q:"Quanti gradi ci sono in un cerchio completo?"},ar:{q:"كم درجة في الدائرة الكاملة؟"}},
  {type:'quiz',en:{q:"How many strings does a standard guitar have?"},de:{q:"Wie viele Saiten hat eine Standardgitarre?"},fr:{q:"Combien de cordes a une guitare standard ?"},es:{q:"¿Cuántas cuerdas tiene una guitarra estándar?"},it:{q:"Quante corde ha una chitarra standard?"},ar:{q:"كم عدد أوتار الغيتار القياسي؟"}},
  {type:'quiz',en:{q:'Who wrote the novel "1984"?'},de:{q:'Wer schrieb den Roman „1984"?'},fr:{q:'Qui a écrit le roman « 1984 » ?'},es:{q:'¿Quién escribió la novela «1984»?'},it:{q:'Chi ha scritto il romanzo «1984»?'},ar:{q:'من كتب رواية «1984»؟'}},
  {type:'quiz',en:{q:"What is the largest country in the world by area?"},de:{q:"Was ist das flächenmäßig größte Land der Welt?"},fr:{q:"Quel est le plus grand pays du monde par superficie ?"},es:{q:"¿Cuál es el país más grande del mundo por superficie?"},it:{q:"Qual è il paese più grande del mondo per superficie?"},ar:{q:"ما هو أكبر دولة في العالم من حيث المساحة؟"}},

 email:[
  {type:'email',en:{from:"Sarah Johnson <s.johnson@company.com>",subject:"Q3 Project — need an update",body:"Hi,\n\nCould you please send me a quick update on the Q3 project? The client has been asking and I'd like to give them something concrete by EOD.\n\nThanks,\nSarah"},de:{from:"Sarah Johnson <s.johnson@firma.de>",subject:"Q3-Projekt — ich brauche ein Update",body:"Hallo,\n\nKönntest du mir kurz den Stand des Q3-Projekts mitteilen? Der Kunde fragt nach und ich möchte ihm noch heute Bescheid geben.\n\nDanke,\nSarah"},fr:{from:"Sarah Johnson <s.johnson@entreprise.fr>",subject:"Projet Q3 — besoin d'une mise à jour",body:"Bonjour,\n\nPourrais-tu m'envoyer une mise à jour rapide sur le projet Q3 ? Le client demande et j'aimerais lui donner quelque chose de concret avant ce soir.\n\nMerci,\nSarah"},es:{from:"Sarah Johnson <s.johnson@empresa.es>",subject:"Proyecto Q3 — actualización",body:"Hola,\n\n¿Podrías enviarme una actualización rápida sobre el proyecto Q3? El cliente está preguntando.\n\nGracias,\nSarah"},it:{from:"Sarah Johnson <s.johnson@azienda.it>",subject:"Progetto Q3 — aggiornamento",body:"Ciao,\n\nPotresti mandarmi un rapido aggiornamento sul progetto Q3?\n\nGrazie,\nSarah"},ar:{from:"سارة جونسون <s.johnson@company.com>",subject:"مشروع Q3 — أحتاج تحديثاً",body:"مرحبا،\n\nهل يمكنك إرسال تحديث سريع عن مشروع Q3؟\n\nشكراً،\nسارة"}},
  {type:'email',en:{from:"Mark Davis <m.davis@clientcorp.com>",subject:"ORDER #4421 — Still waiting!",body:"This is completely unacceptable. I ordered three weeks ago and still haven't received anything. I've sent two emails with no response.\n\nPlease explain what is going on or I will be filing a formal complaint.\n\nMark Davis"},de:{from:"Mark Davis <m.davis@kundenkorps.de>",subject:"BESTELLUNG #4421 — Immer noch nichts!",body:"Das ist absolut inakzeptabel. Ich habe vor drei Wochen bestellt und bisher nichts erhalten. Zwei E-Mails ohne Antwort.\n\nBitte erklären Sie mir, was los ist.\n\nMark Davis"},fr:{from:"Mark Davis <m.davis@clientcorp.fr>",subject:"COMMANDE #4421 — Toujours rien !",body:"C'est tout à fait inacceptable. J'ai commandé il y a trois semaines et je n'ai toujours rien reçu. Deux e-mails sans réponse.\n\nMark Davis"},es:{from:"Mark Davis <m.davis@clientcorp.es>",subject:"PEDIDO #4421 — ¡Aún esperando!",body:"Esto es completamente inaceptable. Hice el pedido hace tres semanas. Dos correos sin respuesta.\n\nMark Davis"},it:{from:"Mark Davis <m.davis@clientcorp.it>",subject:"ORDINE #4421 — Ancora in attesa!",body:"Questo è inaccettabile. Ho ordinato tre settimane fa. Due email senza risposta.\n\nMark Davis"},ar:{from:"مارك ديفيس <m.davis@clientcorp.com>",subject:"الطلب #4421 — ما زلت أنتظر!",body:"هذا غير مقبول. لقد طلبت قبل ثلاثة أسابيع. بريدان دون رد.\n\nمارك ديفيس"}},
  {type:'email',en:{from:"Julia Mendez <j.mendez@company.com>",subject:"You missed the 9am standup",body:"Hi,\n\nI noticed you weren't on the call this morning. This is the second time this month. Can you let me know what happened and confirm you're available tomorrow at the same time?\n\nJulia"},de:{from:"Julia Mendez <j.mendez@firma.de>",subject:"Du hast das 9-Uhr-Meeting verpasst",body:"Hallo,\n\nDu warst heute Morgen nicht beim Anruf dabei. Das ist jetzt das zweite Mal. Kannst du mir erklären was passiert ist?\n\nJulia"},fr:{from:"Julia Mendez <j.mendez@societe.fr>",subject:"Tu as manqué le standup de 9h",body:"Bonjour,\n\nTu n'étais pas sur l'appel ce matin. C'est la deuxième fois ce mois-ci. Peux-tu m'expliquer ?\n\nJulia"},es:{from:"Julia Mendez <j.mendez@empresa.es>",subject:"Faltaste al standup de las 9",body:"Hola,\n\nNo estuviste en la llamada esta mañana. Es la segunda vez este mes.\n\nJulia"},it:{from:"Julia Mendez <j.mendez@azienda.it>",subject:"Hai perso lo standup delle 9",body:"Ciao,\n\nNon eri nella chiamata questa mattina. È la seconda volta questo mese.\n\nJulia"},ar:{from:"خوليا مينديز <j.mendez@company.com>",subject:"غبت عن اجتماع الساعة 9",body:"مرحبا،\n\nلاحظتُ غيابك عن المكالمة. هذه المرة الثانية هذا الشهر.\n\nخوليا"}},
  {type:'email',en:{from:"Alex Turner <a.turner@recruitmentsolutions.com>",subject:"Exciting senior role — worth a quick chat?",body:"Hi,\n\nI came across your profile and was genuinely impressed. We're filling a senior role at a fast-growing tech startup — €80–110k + equity.\n\nWould you be open to a 20-minute call this week?\n\nBest, Alex"},de:{from:"Alex Turner <a.turner@personalberatung.de>",subject:"Interessante Senior-Stelle — kurz reden?",body:"Hallo,\n\nIch bin auf Ihr Profil gestoßen. Wir besetzen eine Senior-Position — 80–110k€ + Beteiligung.\n\nWären Sie offen für einen kurzen Anruf?\n\nMfG, Alex"},fr:{from:"Alex Turner <a.turner@recrutement.fr>",subject:"Poste senior intéressant — on en discute ?",body:"Bonjour,\n\nVotre profil m'a impressionné. Un poste senior dans une startup tech en forte croissance — 80–110k€.\n\nAlex"},es:{from:"Alex Turner <a.turner@recruitmentsolutions.es>",subject:"Posición senior — ¿charlamos?",body:"Hola,\n\nTu perfil me ha impresionado. Posición senior en startup tech — 80–110k€.\n\nAlex"},it:{from:"Alex Turner <a.turner@recruitmentsolutions.it>",subject:"Ruolo senior interessante",body:"Salve,\n\nHo trovato il suo profilo impressionante. Ruolo senior in startup tech — 80–110k€.\n\nAlex"},ar:{from:"أليكس تيرنر <a.turner@recruitmentsolutions.com>",subject:"منصب كبير مثير — نتحدث؟",body:"مرحبا،\n\nعثرت على ملفك وأعجبني. منصب كبير في شركة ناشئة — 80k€.\n\nأليكس"}},
  {type:'email',en:{from:"Mom <susan.parker@gmail.com>",subject:"Christmas — are you coming home??",body:"Hi sweetheart,\n\nI just need to know your plans for Christmas. Your aunt is flying in from Toronto and I need to book the hotel rooms. Can you let me know by Friday?\n\nAlso — have you been eating properly?\n\nLots of love, Mom xx"},de:{from:"Mama <mama@gmail.com>",subject:"Weihnachten — kommst du heim??",body:"Hallo Schatz,\n\nIch muss wissen, was du zu Weihnachten vorhast. Deine Tante fliegt ein — ich muss Hotelzimmer buchen. Bis Freitag?\n\nIsst du ordentlich?\n\nGanz viel Liebe, Mama"},fr:{from:"Maman <maman@gmail.com>",subject:"Noël — tu rentres ??",body:"Ma chérie,\n\nJ'ai besoin de savoir tes projets pour Noël. Ta tante arrive et je dois réserver. Avant vendredi ?\n\nMaman"},es:{from:"Mamá <mama@gmail.com>",subject:"Navidad — ¿vienes?",body:"Cariño,\n\nNecesito saber tus planes para Navidad. Tu tía viene — ¿antes del viernes?\n\nMamá"},it:{from:"Mamma <mamma@gmail.com>",subject:"Natale — torni a casa??",body:"Caro/a,\n\nDevo sapere i tuoi piani per il Natale. Tua zia arriva — entro venerdì?\n\nMamma"},ar:{from:"أمي <mama@gmail.com>",subject:"عيد الميلاد — هل ستعود؟",body:"أهلاً حبيبي،\n\nأحتاج أن أعرف خططك. عمتك قادمة — قبل الجمعة؟\n\nأمك"}},
  {type:'email',en:{from:"accounts@supplychain-eu.com",subject:"Invoice INV-2024-0892 — discrepancy",body:"Dear Team,\n\nRe invoice INV-2024-0892 (Nov 14): we were billed €4,250 for 17 units. Our PO was for 12 units × €230 = €2,760.\n\nPlease issue a corrected invoice or confirm this is under review.\n\nRegards"},de:{from:"buchhaltung@lieferkette-eu.de",subject:"Rechnung RG-2024-0892 — Abweichung",body:"Sehr geehrte Damen und Herren,\n\nRechnung RG-2024-0892: Wir wurden für 17 Einheiten mit 4.250 € belastet. Unsere Bestellung: 12 × 230 € = 2.760 €.\n\nBitte stellen Sie eine korrigierte Rechnung aus.\n\nMfG"},fr:{from:"comptabilite@appro-eu.fr",subject:"Facture — écart",body:"Madame, Monsieur,\n\nFacture FAC-2024-0892: facturés 4 250 € pour 17 unités. Notre bon de commande: 12 × 230 € = 2 760 €.\n\nCordialement"},es:{from:"cuentas@cadenasuministros-eu.es",subject:"Factura — discrepancia",body:"Estimado equipo,\n\nFactura: cobrados €4.250 por 17 unidades. Nuestra OC: 12 × €230 = €2.760.\n\nAtentamente"},it:{from:"contabilita@catenaforniture-eu.it",subject:"Fattura — discrepanza",body:"Gentili signori,\n\nFattura: addebitato €4.250 per 17 unità. Il nostro ordine: 12 × €230 = €2.760.\n\nDistinti saluti"},ar:{from:"accounts@supplychain-eu.com",subject:"الفاتورة — تناقض",body:"عزيزي الفريق،\n\nصدرت فاتورة بمبلغ 4,250€ لـ 17 وحدة. طلبيتنا: 12 × 230€ = 2,760€.\n\nمع التحية"}},
  {type:'email',en:{from:"l.okonkwo@university.edu",subject:"Extension request — Assignment 3",body:"Dear Professor,\n\nI'm requesting a 3-day extension for Assignment 3 (due Friday). A family health situation this week has significantly impacted my ability to work. I've completed about 60% and can deliver quality work by Monday.\n\nThank you,\nLena Okonkwo"},de:{from:"l.okonkwo@universitaet.de",subject:"Fristerlängerung — Aufgabe 3",body:"Sehr geehrte/r Professor/in,\n\nIch bitte um 3 Tage Verlängerung für Aufgabe 3. Eine familiäre Situation hat mich stark beeinträchtigt.\n\nVielen Dank,\nLena"},fr:{from:"l.okonkwo@universite.fr",subject:"Demande de délai — Devoir 3",body:"Cher/Chère Professeur(e),\n\nJe demande une prolongation de 3 jours pour le Devoir 3. Situation familiale difficile cette semaine.\n\nLena Okonkwo"},es:{from:"l.okonkwo@universidad.es",subject:"Solicitud de prórroga — Tarea 3",body:"Estimado/a Profesor/a,\n\nSolicito prórroga de 3 días para la Tarea 3. Situación familiar esta semana.\n\nLena Okonkwo"},it:{from:"l.okonkwo@universita.it",subject:"Richiesta proroga — Compito 3",body:"Gentile Professore/ssa,\n\nRichiedo proroga di 3 giorni per il Compito 3. Situazione familiare questa settimana.\n\nLena Okonkwo"},ar:{from:"l.okonkwo@university.edu",subject:"طلب تمديد — المهمة 3",body:"أستاذي العزيز،\n\nأطلب تمديداً 3 أيام للمهمة 3. وضع صحي عائلي أثّر عليّ.\n\nلينا"}},
  {type:'email',en:{from:"neighbor.apt4b@gmail.com",subject:"Noise from your flat — last two nights",body:"Hi,\n\nThe music/bass from your apartment between midnight and 2am has been very loud. I have an early start tomorrow and this is a recurring problem.\n\nCould you please keep it down after 10pm?\n\nThank you,\nNeighbor, Apt 4C"},de:{from:"nachbar.4b@gmail.com",subject:"Lärm aus Ihrer Wohnung",body:"Hallo,\n\nDie Musik zwischen Mitternacht und 2 Uhr war sehr laut. Bitte ab 22 Uhr leiser sein?\n\nNachbar/in 4C"},fr:{from:"voisin.4b@gmail.com",subject:"Bruit — deux dernières nuits",body:"Bonjour,\n\nLa musique entre minuit et 2h était très forte. Pourriez-vous faire moins de bruit après 22h ?\n\nVoisin(e) 4C"},es:{from:"vecino.4b@gmail.com",subject:"Ruido — últimas dos noches",body:"Hola,\n\nLa música entre medianoche y las 2am fue muy fuerte. ¿Podrías bajar el volumen después de las 22h?\n\nVecino/a 4C"},it:{from:"vicino.4b@gmail.com",subject:"Rumore — ultime due notti",body:"Salve,\n\nLa musica tra mezzanotte e le 2 era molto forte. Potrebbe abbassare il volume dopo le 22?\n\nVicino/a 4C"},ar:{from:"جار.4b@gmail.com",subject:"ضوضاء — الليلتين الماضيتين",body:"مرحبا،\n\nالموسيقى بين منتصف الليل والساعة 2 كانت عالية جداً. هل يمكنك تخفيض الصوت بعد الساعة 10؟\n\nجارك 4C"}},
  {type:'email',en:{from:"appointments@dr-clinic.com",subject:"Appointment reminder — Tue 19 Nov, 10:30",body:"Dear Patient,\n\nReminder: your appointment with Dr. Schneider is Tuesday 19 Nov at 10:30.\n\nPlease reply to confirm, or call 030-5521 to reschedule. Bring any relevant test results.\n\nBest regards,\nThe Practice"},de:{from:"termin@praxis.de",subject:"Terminerinnerung — Di 19. Nov, 10:30",body:"Sehr geehrte/r Patient/in,\n\nIhr Termin bei Dr. Schneider: Dienstag, 19. Nov. um 10:30 Uhr.\n\nBitte bestätigen oder unter 030-5521 umbuchen.\n\nMfG"},fr:{from:"rdv@cabinet-medical.fr",subject:"Rappel rendez-vous — Mar 19 nov",body:"Rappel: rendez-vous avec le Dr Dupont le mardi 19 novembre à 10h30.\n\nVeuillez confirmer ou appeler le 01-5521."},es:{from:"citas@consulta.es",subject:"Recordatorio cita — Mar 19 nov",body:"Recordatorio: cita con el Dr. García el martes 19 de noviembre a las 10:30.\n\nConfirme o llame al 91-5521."},it:{from:"appuntamenti@studio-medico.it",subject:"Promemoria appuntamento — Mar 19 nov",body:"Promemoria: appuntamento con il Dott. Rossi martedì 19 novembre alle 10:30.\n\nRisponda per confermare o chiami il 06-5521."},ar:{from:"appointments@dr-clinic.com",subject:"تذكير موعد — الثلاثاء 19 نوفمبر",body:"تذكير: موعدك مع الطبيب الثلاثاء الساعة 10:30.\n\nارد للتأكيد أو اتصل بنا."}},
  {type:'email',en:{from:"Alex Chen <alex.chen@team.com>",subject:"Demo tomorrow — are we ready?",body:"Hey,\n\nChecking in before the client demo tomorrow at 2pm. Is your part done? I need to sync the slides and run a test by 10am.\n\nAlso — PM asked if we can add the reporting feature. I said probably not for this demo, but wanted to check.\n\nLet me know! Alex"},de:{from:"Alex Chen <alex.chen@team.de>",subject:"Demo morgen — bereit?",body:"Hey,\n\nKurze Rückfrage vor der Demo morgen um 14 Uhr. Ist dein Teil fertig? Ich brauche die Folien bis 10 Uhr.\n\nPM fragt nach der Reporting-Funktion — was sagst du?\n\nAlex"},fr:{from:"Alex Chen <alex.chen@equipe.fr>",subject:"Démo demain — on est prêts ?",body:"Salut,\n\nVérification avant la démo client demain à 14h. Ta partie est prête ? Slides à synchroniser d'ici 10h.\n\nAlex"},es:{from:"Alex Chen <alex.chen@equipo.es>",subject:"Demo mañana — ¿listos?",body:"Hola,\n\n¿Está lista tu parte para la demo de mañana? Necesito sincronizar diapositivas antes de las 10h.\n\nAlex"},it:{from:"Alex Chen <alex.chen@team.it>",subject:"Demo domani — pronti?",body:"Ciao,\n\nLa tua parte è pronta per la demo domani? Devo sincronizzare le slide entro le 10.\n\nAlex"},ar:{from:"أليكس تشن <alex.chen@team.com>",subject:"العرض غداً — هل نحن مستعدون؟",body:"مرحبا،\n\nهل جزءك جاهز للعرض غداً؟ أحتاج مزامنة الشرائح بحلول الساعة 10.\n\nأليكس"}},

    {i:'💔',t:'Dysphorie de rejet (DRS)',p:"Une réponse légèrement plate en réunion. Un message laissé sans réponse. Le système nerveux TDAH ne perçoit pas cela comme neutre — il le vit comme un rejet soudain et écrasant. Ça passe en quelques minutes. Mais sur le moment, c'est indiscernable d'une vraie perte, et l'anticipation de ce rejet façonne chaque interaction sociale."},

// ── SOUNDSCAPE ────────────────────────────────
const SFX = {
  audio:null, ctx:null, master:null,
  type:'airport', muted:false, _ids:[], _ft:null,
  init(t){this.type=t;},
  start() {
    if(this.type==='silent') return;
    this.audio = new Audio(this.type+'.mp3');
    this.audio.loop = true;
    this.audio.volume = 0;
    this.audio.play().catch(e=>console.warn('Audio:',e));
    // Fallback loop in case the loop attribute is ignored
    this.audio.addEventListener('ended', ()=>{
      if(this.audio){ this.audio.currentTime=0; this.audio.play().catch(()=>{}); }
    });
    this._fadeTo(0.50, 2500);
    try {
      this.ctx = new (window.AudioContext||window.webkitAudioContext)();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.75;
      this.master.connect(this.ctx.destination);
    } catch(e){console.warn('WebAudio:',e);}
    this._schedule();
  },
  stop() {
    speechSynthesis.cancel();
    this._ids.forEach(clearTimeout); this._ids=[];
    if(this._ft){clearInterval(this._ft);this._ft=null;}
    if(this.audio){
      const a=this.audio; this.audio=null;
      this._fadeOut(a,700,()=>{a.pause();a.src='';});
    }
    if(this.ctx){this.ctx.close().catch(()=>{});this.ctx=null;}
  },
  setPhase(p) {
    const v={calm:.50,mild:.62,moderate:.78,intense:.98}[p]||.50;
    if(this.audio&&!this.muted) this._fadeTo(v,2000);
  },
  toggle() {
    this.muted=!this.muted;
    if(this.audio) this.audio.volume=this.muted?0:0.55;
    if(this.ctx) this.master.gain.setTargetAtTime(this.muted?0:0.75,this.ctx.currentTime,0.3);
    if(this.muted) speechSynthesis.cancel();
    return this.muted;
  },
  _fadeTo(target,ms) {
    if(!this.audio) return;
    if(this._ft) clearInterval(this._ft);
    const start=this.audio.volume, steps=Math.max(1,ms/50), inc=(target-start)/steps;
    let s=0;
    this._ft=setInterval(()=>{
      s++; if(this.audio) this.audio.volume=Math.min(1,Math.max(0,start+inc*s));
      if(s>=steps){clearInterval(this._ft);this._ft=null;}
    },50);
  },
  _fadeOut(el,ms,cb) {
    const steps=Math.round(ms/50),inc=el.volume/steps;let s=0;
    const t=setInterval(()=>{s++;el.volume=Math.max(0,el.volume-inc);if(s>=steps){clearInterval(t);cb&&cb();}},50);
  },
  _later(ms,fn){const id=setTimeout(()=>fn(),ms);this._ids.push(id);},
  _schedule() {
    if(this.type==='airport'){
      const chime=()=>{this._chime();this._later(100000+Math.random()*80000,chime);};
      this._later(3000,chime);
      const ann=()=>{this._chime();this._later(1600,()=>this._speak('airport'));this._later(150000+Math.random()*90000,ann);};
      this._later(90000,ann);
    } else if(this.type==='subway'){
      const bell=()=>{this._bell();this._later(150000+Math.random()*90000,bell);};
      this._later(2000,bell);
      const ann=()=>{this._bell();this._later(2000,()=>this._speak('train'));this._later(160000+Math.random()*120000,ann);};
      this._later(55000,ann);
    } else if(this.type==='shoppingmall'){
      const ann=()=>{this._chime();this._later(1200,()=>this._speak('mall'));this._later(180000+Math.random()*120000,ann);};
      this._later(60000,ann);
    }
  },
  _chime() {
    if(!this.ctx) return;
    [880,698,784].forEach((freq,i)=>{
      const osc=this.ctx.createOscillator(),g=this.ctx.createGain();
      osc.type='sine';osc.frequency.value=freq;
      const t=this.ctx.currentTime+i*.38;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.28,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+2);
      osc.connect(g);g.connect(this.master);osc.start(t);osc.stop(t+2);
    });
  },
  _bell() {
    if(!this.ctx) return;
    [1,2.756,5.404,8.933].forEach((r,i)=>{
      const osc=this.ctx.createOscillator(),g=this.ctx.createGain();
      osc.type='sine';osc.frequency.value=520*r;
      const amp=.26/(i+1),dec=2.8/(i*.5+1),now=this.ctx.currentTime;
      g.gain.setValueAtTime(amp,now);g.gain.exponentialRampToValueAtTime(.001,now+dec);
      osc.connect(g);g.connect(this.master);osc.start(now);osc.stop(now+dec+.05);
    });
  },
  // ── UI sound effects ─────────────────────────
  // Helper: create a gain node connected to master (or destination if no master yet)
  _g(vol) {
    if(!this.ctx) return null;
    const g=this.ctx.createGain();
    g.gain.value=vol;
    g.connect(this.master||this.ctx.destination);
    return g;
  },
  // Thought bubble pop — soft, rounded, slightly silly
  sfxThought() {
    if(this.muted||!this.ctx) return;
    const now=this.ctx.currentTime;
    // Rising sine blip
    const osc=this.ctx.createOscillator(), g=this._g(0);
    osc.type='sine'; osc.frequency.setValueAtTime(420,now); osc.frequency.linearRampToValueAtTime(680,now+.06);
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.18,now+.02); g.gain.exponentialRampToValueAtTime(.001,now+.22);
    osc.connect(g); osc.start(now); osc.stop(now+.25);
    // Soft noise puff underneath
    const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*.08,this.ctx.sampleRate);
    const data=buf.getChannelData(0); for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*.3;
    const src=this.ctx.createBufferSource(), f=this.ctx.createBiquadFilter(), gn=this._g(0);
    f.type='bandpass'; f.frequency.value=600; f.Q.value=1.5;
    src.buffer=buf; src.connect(f); f.connect(gn);
    gn.gain.setValueAtTime(.12,now); gn.gain.exponentialRampToValueAtTime(.001,now+.08);
    src.start(now); src.stop(now+.08);
  },
  // Notification chime — phone-like ascending double ping
  sfxNotif() {
    if(this.muted||!this.ctx) return;
    const now=this.ctx.currentTime;
    [[880,.0],[1109,.12]].forEach(([freq,delay])=>{
      const osc=this.ctx.createOscillator(), g=this._g(0);
      osc.type='sine'; osc.frequency.value=freq;
      const t=now+delay;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.22,t+.01); g.gain.exponentialRampToValueAtTime(.001,t+.45);
      osc.connect(g); osc.start(t); osc.stop(t+.48);
    });
  },
  // Time shock — dissonant alarm pulse, jarring
  sfxShock() {
    if(this.muted||!this.ctx) return;
    const now=this.ctx.currentTime;
    // Three sharp pulses
    [0,.18,.36].forEach(offset=>{
      const osc=this.ctx.createOscillator(), g=this._g(0);
      osc.type='sawtooth'; osc.frequency.value=180;
      const t=now+offset;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.3,t+.01); g.gain.exponentialRampToValueAtTime(.001,t+.14);
      osc.connect(g); osc.start(t); osc.stop(t+.16);
    });
    // Low dissonant undertone
    const osc2=this.ctx.createOscillator(), g2=this._g(0);
    osc2.type='square'; osc2.frequency.value=123;
    g2.gain.setValueAtTime(0,now); g2.gain.linearRampToValueAtTime(.15,now+.02); g2.gain.exponentialRampToValueAtTime(.001,now+.55);
    osc2.connect(g2); osc2.start(now); osc2.stop(now+.6);
  },
  // Fact click — satisfying "ding" with a sneaky downward drain tail
  sfxFact() {
    if(this.muted||!this.ctx) return;
    const now=this.ctx.currentTime;
    // Bright ping
    const osc=this.ctx.createOscillator(), g=this._g(0);
    osc.type='triangle'; osc.frequency.setValueAtTime(1320,now); osc.frequency.exponentialRampToValueAtTime(660,now+.5);
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.2,now+.015); g.gain.exponentialRampToValueAtTime(.001,now+.5);
    osc.connect(g); osc.start(now); osc.stop(now+.52);
    // Drain whoosh — descending noise
    const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*.4,this.ctx.sampleRate);
    const data=buf.getChannelData(0); for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
    const src=this.ctx.createBufferSource(), f=this.ctx.createBiquadFilter(), gn=this._g(0);
    f.type='highpass'; f.frequency.setValueAtTime(2000,now); f.frequency.exponentialRampToValueAtTime(200,now+.4);
    src.buffer=buf; src.connect(f); f.connect(gn);
    gn.gain.setValueAtTime(.08,now+.1); gn.gain.exponentialRampToValueAtTime(.001,now+.4);
    src.start(now+.1); src.stop(now+.42);
  },
  // Task submit — two-note soft confirm
  sfxSubmit() {
    if(this.muted||!this.ctx) return;
    const now=this.ctx.currentTime;
    [[523,.0],[784,.1]].forEach(([freq,delay])=>{
      const osc=this.ctx.createOscillator(), g=this._g(0);
      osc.type='triangle'; osc.frequency.value=freq;
      const t=now+delay;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.16,t+.01); g.gain.exponentialRampToValueAtTime(.001,t+.35);
      osc.connect(g); osc.start(t); osc.stop(t+.38);
    });
  },
  // Memory phase transition — soft ascending shimmer
  sfxMemory() {
    if(this.muted||!this.ctx) return;
    const now=this.ctx.currentTime;
    [523,659,784,1047].forEach((freq,i)=>{
      const osc=this.ctx.createOscillator(), g=this._g(0);
      osc.type='sine'; osc.frequency.value=freq;
      const t=now+i*.07;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.12,t+.02); g.gain.exponentialRampToValueAtTime(.001,t+.3);
      osc.connect(g); osc.start(t); osc.stop(t+.32);
    });
  },
  // Fidget click — hard mechanical snap
  sfxFidget() {
    if(this.muted||!this.ctx) return;
    const now=this.ctx.currentTime;
    const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*.04,this.ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*(1-i/data.length);
    const src=this.ctx.createBufferSource(), f=this.ctx.createBiquadFilter(), g=this._g(.35);
    f.type='peaking'; f.frequency.value=3500; f.gain.value=8;
    src.buffer=buf; src.connect(f); f.connect(g);
    src.start(now); src.stop(now+.04);
  },
  // Phase escalation marker — low resonant thud
  sfxPhase() {
    if(this.muted||!this.ctx) return;
    const now=this.ctx.currentTime;
    const osc=this.ctx.createOscillator(), g=this._g(0);
    osc.type='sine'; osc.frequency.setValueAtTime(80,now); osc.frequency.exponentialRampToValueAtTime(40,now+.4);
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.35,now+.03); g.gain.exponentialRampToValueAtTime(.001,now+.45);
    osc.connect(g); osc.start(now); osc.stop(now+.48);
  },
  _speak(key) {
    if(this.muted||!window.speechSynthesis) return;
    const pool=T[lang].speak[key];
    if(!pool||!pool.length) return;
    const text=pool[Math.floor(Math.random()*pool.length)];
    const u=new SpeechSynthesisUtterance(text);
    u.rate=.82;u.pitch=.9;u.volume=.4;
    u.lang={en:'en-US',de:'de-DE',fr:'fr-FR',es:'es-ES',it:'it-IT',ar:'ar-SA'}[lang]||'en-US';
    speechSynthesis.speak(u);
  },
};

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

const TM = {
  queue:[], idx:0, cdTimer:null, cdSecs:0, memPhase:0,
  // Use ALL tasks shuffled — hard 20-min cutoff handles timing
  build() {
    const all=shuffle([...POOL.quiz,...POOL.email,...POOL.memory]);
    const hPos=typeof TYPE_CFG!=='undefined'?TYPE_CFG[adhdType||'combined'].hPos:4;
    if(POOL.hyperfocus&&POOL.hyperfocus.length) all.splice(Math.min(hPos,all.length),0,POOL.hyperfocus[0]);
    this.queue=all; this.idx=0;
  },
  start() { this.build(); this.show(); },
  show() {
    if(phase==='debrief') return;
    const task=this.queue[this.idx];
    if(!task){ this.build(); this.show(); return; }
    const S=T[lang];
    document.getElementById('ui-task-eyebrow').textContent=
      `${S.taskLabel} ${this.idx+1} ${S.taskOf} ${this.queue.length}`;
    this.memPhase=0;
    renderTask(task);
    this.updateDots();
    if(task.type==='memory'){
      this.memPhase=1;
      const subBtn=document.getElementById('task-sub');
      if(subBtn){subBtn.disabled=true;subBtn.textContent='⏳ '+S.memWarning;}
      this.startCd(task.showSecs,()=>{this.memPhase=2;SFX.sfxMemory();renderMemoryRecall(task);this.startCd(90,()=>this.advance());});
    } else if(task.type==='hyperfocus'){
      hyperFocusActive=true; hyperLevel=0; hyperStartTick=ticks;
      this.startCd(480,()=>{
        hyperFocusActive=false;
        const m=Math.max(1,Math.round((ticks-hyperStartTick)/60));
        showHyperSnap(task,m);
        later(3500,()=>this.advance());
      });
    } else {
      hyperFocusActive=false;
      const secs=task.type==='email'?180:120;
      this.startCd(secs,()=>this.advance());
    }
  },
  startCd(secs,onEnd) {
    clearInterval(this.cdTimer);
    this.cdSecs=secs; this._onEnd=onEnd; this.updateCd();
    this.cdTimer=setInterval(()=>{
      this.cdSecs--;this.updateCd();
      if(this.cdSecs<=0){clearInterval(this.cdTimer);onEnd();}
    },1000);
  },
  updateCd() {
    const el=document.getElementById('task-cd');if(!el)return;
    const m=String(Math.floor(this.cdSecs/60)).padStart(2,'0');
    const s=String(this.cdSecs%60).padStart(2,'0');
    el.textContent=`${m}:${s}`;
    el.className='task-cd'+(this.cdSecs<=15?' urgent':this.cdSecs<=30?' warn':'');
  },
  updateDots() {
    const el=document.getElementById('tp-dots');if(!el)return;
    // Show only a window of dots to avoid overflow
    const total=this.queue.length, win=Math.min(total,20);
    const start=Math.max(0,Math.min(this.idx-Math.floor(win/2),total-win));
    let html='';
    for(let i=start;i<start+win;i++){
      const t=this.queue[i];
      const cls=['tp-dot',i<this.idx?'done':i===this.idx?'cur':'',i===this.idx?t.type[0]+'t':''].join(' ').trim();
      html+=`<span class="${cls}"></span>`;
    }
    if(total>win) html+=`<span style="font-size:.65rem;color:var(--muted);margin-left:4px">+${total-win}</span>`;
    el.innerHTML=html;
  },
  submit() {
    if(this.memPhase===1) return;
    clearInterval(this.cdTimer);
    const task=this.queue[this.idx];
    if(task&&task.type==='hyperfocus'){
      hyperFocusActive=false;
      const m=Math.max(1,Math.round((ticks-hyperStartTick)/60));
      showHyperSnap(task,m);
      later(3500,()=>this.advance());
    } else {
      simStats.tasksCompleted++;
      SFX.sfxSubmit();
      this.advance();
    }
  },
  advance() {
    this.idx++;
    this.updateDots();
    if(this.idx>=this.queue.length){ this.build(); this.idx=0; this.show(); }
    else { this.show(); }
  },
  stop() { clearInterval(this.cdTimer); },
};

// ── SIM STATE ─────────────────────────────────
let focus=100, ticks=0, phase='welcome';
let simStats={tasksCompleted:0,thoughtsSpawned:0,notifsSpawned:0,coworkerHits:0,hyperFocusSecs:0,focusSamples:[]};
let adhdType='combined', diffLevel='medium', trainerMode=false, trainerCtx='general';

const DIFF_CFG={
  easy:  {pt:[240000,600000,960000], drainMul:.50, gapMul:1.7, env:[260000,340000,420000]},
  medium:{pt:[120000,360000,720000], drainMul:1.0, gapMul:1.0, env:[200000,260000,310000]},
  full:  {pt:[ 60000,180000,360000], drainMul:1.5, gapMul:.60, env:[120000,160000,200000]},
};
const TYPE_CFG={
  inattentive:{tMul:.50, nMul:1.9, cw:[600000,1000000,null], hPos:3, fidgetMs:360000},
  combined:   {tMul:1.0, nMul:1.0, cw:[310000,620000,980000], hPos:4, fidgetMs:260000},
  hyperactive:{tMul:2.0, nMul:.45, cw:[240000,480000,720000], hPos:8, fidgetMs:120000},
};
let thoughtIdx=0, notifIdx=0, factIdx=0, fidgetClicks=0;
let thoughtCount=0, notifCount=0;
let simTimer, allTO=[];

function later(ms,fn){const id=setTimeout(fn,ms);allTO.push(id);}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ── START ─────────────────────────────────────
function startSim() {
  ticks=0; focus=100; phase='calm';
  thoughtIdx=0; notifIdx=0; factIdx=0; fidgetClicks=0;
  thoughtCount=0; notifCount=0;

  // Reset UI
  document.getElementById('task-display').innerHTML='';
  document.getElementById('tp-dots').innerHTML='';
  document.getElementById('task-cd').textContent='';
  document.getElementById('tl-body').innerHTML='';
  document.getElementById('notifs').innerHTML='';
  document.getElementById('thoughts').innerHTML='';
  document.getElementById('tasklist').classList.remove('show');
  document.getElementById('fact').classList.remove('show');
  document.getElementById('fidget').classList.remove('show');
  document.getElementById('shock').classList.remove('show');
  document.getElementById('coworker').classList.remove('show');
  document.getElementById('med-badge').classList.remove('show');
  hyperFocusActive=false; hyperLevel=0; hyperStartTick=0;
  document.getElementById('fact-more').textContent=T[lang].factMore[0];
  document.body.classList.remove('phase-moderate','phase-intense');
  updateMeter();
  show('simulation');
  // Audio: if running from calibration, just ramp up; else start fresh
  if(SFX.ctx){ SFX._fadeTo(0.50,2000); } else { SFX.start(); }
  // Medication badge
  if(medicationMode){
    const mb=document.getElementById('med-badge');
    if(mb){ mb.textContent=T[lang].medBadge||'💊'; mb.classList.add('show'); }
  }
  TM.start();  // ← kicks off the task queue

  simTimer=setInterval(tick,1000);

  // Phase escalation over 20 min
  const D=DIFF_CFG[diffLevel], Ty=TYPE_CFG[adhdType];
  later(D.pt[0], ()=>{ phase='mild';     SFX.setPhase('mild'); SFX.sfxPhase(); });
  later(D.pt[1], ()=>{ phase='moderate'; document.body.classList.remove('phase-intense'); document.body.classList.add('phase-moderate'); SFX.setPhase('moderate'); SFX.sfxPhase(); });
  later(D.pt[2], ()=>{ phase='intense';  document.body.classList.remove('phase-moderate'); document.body.classList.add('phase-intense');  SFX.setPhase('intense');  SFX.sfxPhase(); });

  // Environmental distractions (difficulty-aware)
  later(D.env[0], ()=>showTaskList());
  later(Ty.fidgetMs*DIFF_CFG[diffLevel].gapMul, ()=>{
    const fb=document.getElementById('fidget');
    fb.classList.add('show');
    if(adhdType==='hyperactive') fb.classList.add('fidget-urgent');
  });
  later(D.env[2], ()=>showFact());

  // Time shocks
  later(480000, ()=>showTimeShock());
  later(780000, ()=>showTimeShock());
  later(1080000, ()=>showTimeShock());

  // Thought + notif schedules
  later(25000,  ()=>schedThoughts());
  later(50000,  ()=>schedNotifs());

  // Coworker (type-aware, skip null entries)
  Ty.cw.forEach((ms,i)=>{ if(ms) later(ms, ()=>spawnCoworker(i)); });
  // Hard stop at 20 minutes
  later(1200000, ()=>endSim());
}

// ── TICK ──────────────────────────────────────
function tick(){
  ticks++;
  const m=String(Math.floor(ticks/60)).padStart(2,'0');
  const s=String(ticks%60).padStart(2,'0');
  document.getElementById('clock').textContent=`${m}:${s}`;
  // Medication wearing off
  if(medicationMode&&ticks===301) showMedWearOff();
  if(ticks%5===0) simStats.focusSamples.push(Math.round(focus));
  if(hyperFocusActive) simStats.hyperFocusSecs++;
  let drain={calm:.015,mild:.04,moderate:.08,intense:.13}[phase]||0;
  drain*=DIFF_CFG[diffLevel].drainMul;
  if(medicationMode&&ticks<=300) drain*=0.07;    // 93% reduction when medicated
  if(hyperFocusActive)           drain=-0.20;    // focus RECOVERS during hyperfocus
  focus=Math.max(0,Math.min(100,focus-drain));
  updateMeter();
}

function schedThoughts(){
  if(phase==='debrief') return;
  if(!hyperFocusActive) spawnThought();
  let lo,hi;
  if(medicationMode&&ticks<=300)[lo,hi]=[150000,240000];
  else {
    const g={calm:[35000,60000],mild:[12000,25000],moderate:[5000,14000],intense:[2500,7000]};
    [lo,hi]=g[phase]||[35000,60000];
    const mul=TYPE_CFG[adhdType].tMul*DIFF_CFG[diffLevel].gapMul;
    lo*=mul; hi*=mul;
  }
  later(lo+Math.random()*(hi-lo),schedThoughts);
}

function schedNotifs(){
  if(phase==='debrief') return;
  spawnNotif();
  let lo,hi;
  if(medicationMode&&ticks<=300)[lo,hi]=[200000,300000];
  else {
    const g={calm:[55000,100000],mild:[20000,38000],moderate:[10000,20000],intense:[5000,12000]};
    [lo,hi]=g[phase]||[55000,100000];
    const mul=TYPE_CFG[adhdType].nMul*DIFF_CFG[diffLevel].gapMul;
    lo*=mul; hi*=mul;
  }
  later(lo+Math.random()*(hi-lo),schedNotifs);
}

function dropFocus(n){focus=Math.max(0,focus-n);updateMeter();}

function updateMeter(){
  const bar=document.getElementById('m-bar'),pct=document.getElementById('m-pct'),mood=document.getElementById('m-mood');
  if(!bar) return;
  bar.style.width=focus+'%'; pct.textContent=Math.round(focus)+'%';
  const S=T[lang];
  if(focus>70){bar.style.background='#15803D';mood.textContent=S.moods[0];}
  else if(focus>45){bar.style.background='#B45309';mood.textContent=S.moods[1];}
  else if(focus>20){bar.style.background='#C2410C';mood.textContent=S.moods[2];}
  else{bar.style.background='#B91C1C';mood.textContent=S.moods[3];}
}

// ── THOUGHTS ──────────────────────────────────
function spawnThought(){
  if(phase==='debrief') return;
  thoughtCount++; simStats.thoughtsSpawned++;
  if(thoughtCount%3===0) haptic([40]);
  // Use type-specific thought pool for hyperactive
  const pool = (adhdType==='hyperactive' && T[lang].thoughtsH && T[lang].thoughtsH.length)
    ? T[lang].thoughtsH : T[lang].thoughts;
  SFX.sfxThought();
  const list=pool;
  const text=list[thoughtIdx++%list.length];
  const el=document.createElement('div');
  el.className='thought';
  el.innerHTML=`${text}<span class="x" onclick="this.parentElement.remove()">×</span>`;
  const vw=Math.max(window.innerWidth,320),vh=Math.max(window.innerHeight,480);
  el.style.left=(12+Math.random()*Math.max(80,vw-270))+'px';
  el.style.top=(72+Math.random()*Math.max(80,vh-200))+'px';
  document.getElementById('thoughts').appendChild(el);
  dropFocus(1);
  later(9000+Math.random()*6000,()=>el.remove());
}

// ── NOTIFICATIONS ─────────────────────────────
function spawnNotif(){
  if(phase==='debrief') return;
  notifCount++; simStats.notifsSpawned++;
  haptic([60]);
  SFX.sfxNotif();
  const list=T[lang].notifs;
  const d=list[notifIdx++%list.length];
  const el=document.createElement('div');

  el.innerHTML=`<div class="notif-ico">${d.i}</div><div><div class="notif-app">${d.a}</div><div class="notif-msg">${d.t}</div></div>`;
  el.onclick=()=>el.remove();
  document.getElementById('notifs').appendChild(el);
  dropFocus(1.5);
  later(5500+Math.random()*3500,()=>el.remove());
}

// ── HYPERFOCUS ────────────────────────────────
function renderHyperTask(task, level) {
  const levels=task.levels[lang]||task.levels.en;
  const hooks=task.hooks[lang]||task.hooks.en;
  const badge=task.badge[lang]||task.badge.en;
  const title=task.title[lang]||task.title.en;
  const sub=task.sub[lang]||task.sub.en;
  const S=T[lang];
  const content=levels.slice(0,level+1).join('<br><br>');
  const hasMore=level<levels.length-1;
  const hookText=hasMore?hooks[Math.min(level,hooks.length-1)]:null;
  const disp=document.getElementById('task-display');
  disp.innerHTML=`<div class="hyper-card">
    <div class="hyper-badge">${badge}</div>
    <div class="task-q" style="margin-bottom:6px">${title}</div>
    <p style="font-size:.8rem;color:var(--ctw-400);font-style:italic;margin-bottom:16px">${sub}</p>
    <div class="hyper-article">${content}</div>
    ${hookText?`<div class="hyper-more" onclick="hyperReadMore()">${hookText}</div>`:''}
    <div class="hyper-note">\u2191 ${S.hypMood||'Hyperfocus active...'}</div>
  </div>`;
}

function hyperReadMore() {
  if(!hyperFocusActive) return;
  const task=TM.queue[TM.idx];
  if(!task||task.type!=='hyperfocus') return;
  const maxLevel=(task.levels[lang]||task.levels.en).length-1;
  if(hyperLevel<maxLevel){
    hyperLevel++;
    renderHyperTask(task,hyperLevel);
    dropFocus(4);
  }
}

function showHyperSnap(task, minsSpent) {
  haptic([600]);

}
